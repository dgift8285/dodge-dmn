<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwiftBot Pairing</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
  }

  .card {
    background: #111;
    border-radius: 16px;
    padding: 32px 24px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 0 40px rgba(255,165,0,0.15);
  }

  .logo {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 12px;
    border: 2px solid #ff8c00;
    box-shadow: 0 0 15px #ff8c00;
  }

  h1 {
    font-size: 26px;
    font-weight: bold;
    color: #ff8c00;
    text-shadow: 0 0 10px #ff8c00, 0 0 20px #ff4500;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 3px;
    color: #ff8c00;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .made-by {
    font-size: 10px;
    color: #ff8c00;
    margin-bottom: 20px;
    letter-spacing: 1px;
    opacity: 0.7;
  }

  /* Rainbow glow animation */
  @keyframes rainbow {
    0%   { border-color: #ff0000; box-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000; }
    16%  { border-color: #ff8800; box-shadow: 0 0 10px #ff8800, 0 0 20px #ff8800; }
    33%  { border-color: #ffff00; box-shadow: 0 0 10px #ffff00, 0 0 20px #ffff00; }
    50%  { border-color: #00ff00; box-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00; }
    66%  { border-color: #0088ff; box-shadow: 0 0 10px #0088ff, 0 0 20px #0088ff; }
    83%  { border-color: #8800ff; box-shadow: 0 0 10px #8800ff, 0 0 20px #8800ff; }
    100% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000; }
  }

  .glow-input {
    width: 100%;
    padding: 13px;
    border-radius: 8px;
    border: 2px solid #ff0000;
    background: #000;
    color: #fff;
    font-size: 15px;
    text-align: center;
    outline: none;
    animation: rainbow 3s linear infinite;
    margin-bottom: 12px;
  }

  .glow-input::placeholder { color: #888; }

  .glow-btn {
    width: 100%;
    padding: 13px;
    border-radius: 8px;
    border: 2px solid #ff0000;
    background: #000;
    color: #fff;
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
    animation: rainbow 3s linear infinite;
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .glow-btn:active { opacity: 0.8; }

  .code-display {
    width: 100%;
    padding: 13px;
    border-radius: 8px;
    border: 2px solid #ff0000;
    background: #000;
    color: #fff;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 6px;
    text-align: center;
    animation: rainbow 3s linear infinite;
    margin-bottom: 12px;
  }

  .copy-btn {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ff8c00;
    background: #000;
    color: #ff8c00;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 12px;
    transition: all 0.2s;
  }

  .copy-btn.copied { color: #00ff00; border-color: #00ff00; }

  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .tab {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #ff8c00;
    background: #000;
    color: #888;
    font-size: 13px;
    cursor: pointer;
  }

  .tab.active {
    color: #ff8c00;
    border-color: #ff8c00;
    box-shadow: 0 0 8px #ff8c00;
  }

  .section { display: none; }
  .section.active { display: block; }

  #qrBox {
    min-height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  #qrBox img {
    width: 180px;
    height: 180px;
    border-radius: 8px;
    border: 2px solid #ff8c00;
    box-shadow: 0 0 15px #ff8c00;
  }

  .status-text {
    font-size: 12px;
    color: #888;
    letter-spacing: 1px;
  }

  .alert {
    padding: 10px;
    border-radius: 8px;
    font-size: 12px;
    margin-bottom: 10px;
  }

  .alert-success { color: #00ff00; border: 1px solid #00ff00; }
  .alert-error { color: #ff4444; border: 1px solid #ff4444; }
  .alert-info { color: #ff8c00; border: 1px solid #ff8c00; }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #333;
    border-top-color: #ff8c00;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .session-badge {
    font-size: 10px;
    color: #555;
    margin-top: 10px;
    word-break: break-all;
  }

  .footer {
    margin-top: 20px;
    font-size: 10px;
    color: #ff8c00;
    letter-spacing: 2px;
    opacity: 0.6;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="card">

  <img src="/assets/botlogo.jpg" alt="SwiftBot" class="logo" onerror="this.style.display='none'">
  <h1>⚡ SWIFTBOT ⚡</h1>
  <p class="subtitle">Pair Code</p>
  <p class="made-by">Smart. Fast. Always Here.</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('qr', this)">QR Code</button>
    <button class="tab" onclick="switchTab('code', this)">Pair Code</button>
  </div>

  <!-- QR Section -->
  <div id="tab-qr" class="section active">
    <div id="qrBox">
      <div class="spinner"></div>
      <p class="status-text" id="qrStatus">STARTING SESSION...</p>
    </div>
  </div>

  <!-- Pair Code Section -->
  <div id="tab-code" class="section">
    <input class="glow-input" type="text" id="phoneInput" placeholder="TYPE YOUR WHATSAPP NUMBER">
    <button class="glow-btn" onclick="requestCode()">GET PAIR CODE</button>
    <div id="codeResult"></div>
  </div>

  <p class="session-badge" id="sessionBadge"></p>
  <button class="glow-btn" onclick="newSession()" style="margin-top:8px;font-size:12px;padding:10px;">PAIR ANOTHER DEVICE</button>

  <div class="footer">
    WHATSAPP BOT<br>
    MADE BY SWIFTBOT TEC<br>
    SWIFTBOT EDITION 2026
  </div>

</div>

<script>
const STORAGE_KEY = 'swiftbot_sid';
let sessionId = localStorage.getItem(STORAGE_KEY);
let qrInterval = null;

function switchTab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

function setQrStatus(text) {
  const el = document.getElementById('qrStatus');
  if (el) el.textContent = text;
}

function showQr(dataUrl) {
  document.getElementById('qrBox').innerHTML =
    '<img src="' + dataUrl + '" alt="QR Code">' +
    '<p class="status-text">SCAN WITH WHATSAPP → LINKED DEVICES</p>';
}

function showConnected() {
  document.getElementById('qrBox').innerHTML =
    '<div class="alert alert-success">✅ CONNECTED! YOUR BOT IS NOW ACTIVE.</div>';
  clearInterval(qrInterval);
}

async function initSession() {
  try {
    const url = sessionId
      ? '/api/session/init?sessionId=' + encodeURIComponent(sessionId)
      : '/api/session/init';
    const res = await fetch(url, { method: 'POST' });
    const data = await res.json();

    if (data.error) {
      document.getElementById('qrBox').innerHTML =
        '<div class="alert alert-error">❌ ' + data.error + '</div>';
      return;
    }

    sessionId = data.sessionId;
    localStorage.setItem(STORAGE_KEY, sessionId);
    document.getElementById('sessionBadge').textContent = 'SESSION: ' + sessionId;
    startQrPolling();
  } catch (err) {
    document.getElementById('qrBox').innerHTML =
      '<div class="alert alert-error">❌ FAILED TO START: ' + err.message + '</div>';
  }
}

function startQrPolling() {
  pollQr();
  clearInterval(qrInterval);
  qrInterval = setInterval(pollQr, 4000);
}

async function pollQr() {
  try {
    const res = await fetch('/api/qr?sessionId=' + encodeURIComponent(sessionId));
    const data = await res.json();
    if (data.connected) {
      showConnected();
    } else if (data.qr) {
      showQr(data.qr);
    } else {
      document.getElementById('qrBox').innerHTML =
        '<div class="spinner"></div><p class="status-text" id="qrStatus">WAITING FOR QR CODE...</p>';
    }
  } catch {
    setQrStatus('CONNECTION ERROR. RETRYING...');
  }
}

async function requestCode() {
  const phone = document.getElementById('phoneInput').value.replace(/\D/g, '');
  const resultEl = document.getElementById('codeResult');

  if (!phone || phone.length < 7) {
    resultEl.innerHTML = '<div class="alert alert-error">ENTER A VALID NUMBER WITH COUNTRY CODE</div>';
    return;
  }
  if (!sessionId) {
    resultEl.innerHTML = '<div class="alert alert-error">GO TO QR TAB FIRST TO START A SESSION</div>';
    return;
  }

  resultEl.innerHTML = '<div class="alert alert-info">⏳ REQUESTING CODE...</div>';

  try {
    const res = await fetch('/api/pair?sessionId=' + encodeURIComponent(sessionId) + '&number=' + phone);
    const data = await res.json();

    if (data.code) {
      if (data.sessionId) {
        sessionId = data.sessionId;
        localStorage.setItem(STORAGE_KEY, sessionId);
        document.getElementById('sessionBadge').textContent = 'SESSION: ' + sessionId;
      }
      resultEl.innerHTML =
        '<div class="code-display" id="pairCodeText">' + data.code + '</div>' +
        '<button class="copy-btn" id="copyBtn" onclick="copyCode(\'' + data.code + '\')">📋 COPY CODE</button>' +
        '<p class="status-text">ENTER IN WHATSAPP → LINKED DEVICES → LINK WITH PHONE NUMBER</p>';
    } else {
      resultEl.innerHTML = '<div class="alert alert-error">❌ ' + (data.error || 'FAILED TO GET CODE') + '</div>';
    }
  } catch (err) {
    resultEl.innerHTML = '<div class="alert alert-error">❌ ' + err.message + '</div>';
  }
}

function copyCode(code) {
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById('copyBtn');
    if (btn) {
      btn.textContent = '✅ COPIED!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '📋 COPY CODE';
        btn.classList.remove('copied');
      }, 2000);
    }
  }).catch(() => {
    const el = document.createElement('textarea');
    el.value = code;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    const btn = document.getElementById('copyBtn');
    if (btn) { btn.textContent = '✅ COPIED!'; setTimeout(() => { btn.textContent = '📋 COPY CODE'; }, 2000); }
  });
}

function newSession() {
  clearInterval(qrInterval);
  localStorage.removeItem(STORAGE_KEY);
  sessionId = null;
  document.getElementById('qrBox').innerHTML =
    '<div class="spinner"></div><p class="status-text" id="qrStatus">STARTING NEW SESSION...</p>';
  document.getElementById('codeResult').innerHTML = '';
  document.getElementById('sessionBadge').textContent = '';
  initSession();
}

initSession();
</script>
</body>
</html>
